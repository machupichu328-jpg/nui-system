<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>グッズ自動確保システム | ダッシュボード</title>
    <!-- アプリ化のためのマニフェストファイルを読み込み -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192/3b82f6/ffffff?text=App">
    
    <style>
        :root {
            --primary-color: #3b82f6;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { margin: 0; font-size: 20px; color: var(--text-main); }
        .user-profile { font-size: 14px; color: var(--text-muted); font-weight: bold; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .alert-box { background: #fef3c7; border-left: 4px solid var(--warning-color); padding: 15px; border-radius: 4px; margin-bottom: 20px; font-size: 14px; }
        .alert-title { font-weight: bold; color: #b45309; margin-bottom: 5px; }
        .status-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .status-title { font-weight: bold; font-size: 16px; }
        .status-amount { font-weight: bold; color: var(--primary-color); font-size: 18px; }
        .progress-bar { width: 100%; height: 10px; background: #e5e7eb; border-radius: 5px; overflow: hidden; margin-bottom: 10px; }
        .progress-fill { height: 100%; width: 100%; background: var(--primary-color); }
        .status-note { font-size: 12px; color: var(--text-muted); text-align: right; }
        .log-title { font-size: 14px; font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid #e5e7eb; padding-bottom: 8px;}
        .log-list { list-style: none; padding: 0; margin: 0; }
        .log-item { display: flex; align-items: flex-start; margin-bottom: 15px; font-size: 13px; }
        .log-time { color: var(--text-muted); width: 50px; flex-shrink: 0; }
        .log-content { flex-grow: 1; }
        .log-status { font-weight: bold; margin-bottom: 2px; }
        .status-active { color: var(--primary-color); }
        .status-success { color: var(--success-color); }
        .sim-btn { display: block; width: 100%; padding: 12px; background: var(--text-main); color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; margin-top: 30px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>ダッシュボード</h1>
        <div class="user-profile">👤 miso さん</div>
    </header>

    <div class="alert-box">
        <div class="alert-title">💡 新作予測通知</div>
        <div>過去のデータから、もうすぐ新作のグッズが出る可能性があります。</div>
    </div>

    <div class="card">
        <div class="status-header">
            <div class="status-title">自動確保済み予算</div>
            <div class="status-amount">¥ 5,000</div>
        </div>
        <div class="progress-bar"><div class="progress-fill"></div></div>
        <div class="status-note">必要予算を100%確保しました。</div>
    </div>

    <div class="card">
        <div class="log-title">システム稼働ログ</div>
        <ul class="log-list" id="systemLogs">
            <li class="log-item">
                <div class="log-time">現在</div>
                <div class="log-content">
                    <div class="log-status status-active">▶ 公式サイト監視中...</div>
                    <div style="color: var(--text-muted);">情報解禁を24時間体制でチェックしています。</div>
                </div>
            </li>
        </ul>
    </div>

    <button class="sim-btn" onclick="startSimulation()">【デモ】情報解禁をシミュレートする</button>
</div>

<script>
    // サービスワーカーの登録 (PWA化に必須)
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('SW登録成功:', reg.scope))
                .catch(err => console.log('SW登録失敗:', err));
        });
    }

    function startSimulation() {
        const btn = document.querySelector('.sim-btn');
        btn.disabled = true; btn.innerText = "自動処理実行中..."; btn.style.background = "#9ca3af";

        if ("Notification" in window) {
            Notification.requestPermission().then(permission => {
                executeSystemLogic(permission);
            });
        } else {
            executeSystemLogic("denied");
        }
    }

    function executeSystemLogic(notificationPermission) {
        const logList = document.getElementById('systemLogs');
        const getTime = () => { const now = new Date(); return `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`; };

        setTimeout(() => {
            const li1 = document.createElement('li'); li1.className = 'log-item';
            li1.innerHTML = `<div class="log-time">${getTime()}</div><div class="log-content"><div class="log-status status-active">❗ 情報解禁を検知</div><div>公式から新作グッズの発表がありました。</div></div>`;
            logList.insertBefore(li1, logList.firstChild);
        }, 1000);

        setTimeout(() => {
            const li2 = document.createElement('li'); li2.className = 'log-item';
            li2.innerHTML = `<div class="log-time">${getTime()}</div><div class="log-content"><div class="log-status status-success">✅ 確保完了（自動予約）</div><div>情報戦を回避し、最速で予約を完了しました！</div></div>`;
            logList.insertBefore(li2, logList.firstChild);
            
            document.querySelector('.alert-box').innerHTML = `<div class="alert-title" style="color: var(--success-color);">🎉 予約完了のお知らせ</div><div style="color: #065f46;">苦労することなく商品を確保できました。</div>`;
            document.querySelector('.alert-box').style.background = "#d1fae5";
            document.querySelector('.alert-box').style.borderLeftColor = "var(--success-color)";
            document.querySelector('.sim-btn').style.display = "none";

            if (notificationPermission === "granted") {
                new Notification("✅ 新作グッズ確保完了", { body: "最速で自動予約を完了しました。" });
            }
        }, 3000);
    }
</script>

</body>
</html>
